<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 책읽기 녹음</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e0f2fe;
    --sky2: #bae6fd;
    --blue: #38bdf8;
    --blue2: #0284c7;
    --blue3: #0369a1;
    --green: #bbf7d0;
    --green2: #4ade80;
    --green3: #16a34a;
    --pink: #fce7f3;
    --pink2: #f9a8d4;
    --pink3: #db2777;
    --yellow: #fef9c3;
    --yellow2: #fde047;
    --yellow3: #ca8a04;
    --red: #fee2e2;
    --red2: #fca5a5;
    --red3: #dc2626;
    --orange: #ffedd5;
    --orange2: #fdba74;
    --orange3: #ea580c;
    --bg: #f0f9ff;
    --white: #ffffff;
    --text: #1e293b;
    --text2: #64748b;
    --border: #cbd5e1;
    --radius: 16px;
    --shadow: 0 4px 16px rgba(56,189,248,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    padding-bottom: 40px;
  }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 60%, #7dd3fc 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .app-header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.18) 0%, transparent 60%);
  }
  .app-header h1 {
    font-family: 'Gaegu', cursive;
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.12);
    position: relative;
    letter-spacing: 0.02em;
  }
  .app-header p {
    font-size: 14px;
    color: rgba(255,255,255,0.88);
    margin-top: 4px;
    position: relative;
  }
  .deco { font-size: 22px; margin: 0 6px; }

  /* ── MAIN ── */
  .main { padding: 0 16px; max-width: 480px; margin: 0 auto; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 18px 16px;
    margin-top: 16px;
    border: 1.5px solid var(--sky2);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--blue3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title .ico { font-size: 16px; }

  /* ── STUDENT ── */
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input {
    flex: 1;
    padding: 9px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--sky2);
    background: var(--sky);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--blue); }
  .btn-add {
    padding: 9px 16px;
    background: var(--blue2);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--blue3); }
  .btn-add:active { transform: scale(0.97); }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; min-height: 28px; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px 5px 12px;
    border-radius: 999px;
    border: 1.5px solid var(--sky2);
    background: var(--sky);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--blue3);
    font-weight: 500;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { background: var(--sky2); }
  .chip.selected {
    background: var(--blue2);
    border-color: var(--blue3);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(2,132,199,0.22);
  }
  .chip .rm {
    font-size: 11px;
    opacity: 0.7;
    cursor: pointer;
    line-height: 1;
    margin-left: 1px;
  }
  .chip.selected .rm { opacity: 0.85; }
  .chip.selected .rm:hover { opacity: 1; }
  .empty-chips { font-size: 13px; color: var(--text2); }

  /* ── BOOK INPUT ── */
  #bookInput {
    width: 100%;
    padding: 9px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--green2);
    background: var(--green);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #bookInput:focus { border-color: var(--green3); }

  /* ── RECORD ── */
  .rec-card {
    background: linear-gradient(135deg, #fff 60%, #f0f9ff 100%);
    border: 1.5px solid var(--sky2);
  }
  .rec-center { text-align: center; padding: 8px 0 4px; }
  .selected-info {
    font-size: 13px;
    color: var(--blue2);
    font-weight: 600;
    margin-bottom: 14px;
    min-height: 20px;
  }
  .selected-info.empty { color: var(--text2); font-weight: 400; }

  .rec-btn-wrap { position: relative; display: inline-block; margin-bottom: 10px; }
  .rec-btn {
    width: 82px; height: 82px;
    border-radius: 50%;
    border: 3px solid var(--blue2);
    background: var(--sky);
    font-size: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 4px 18px rgba(56,189,248,0.22);
  }
  .rec-btn:hover { background: var(--sky2); transform: scale(1.05); }
  .rec-btn:active { transform: scale(0.97); }
  .rec-btn.recording {
    background: var(--red);
    border-color: var(--red3);
    animation: pulse 1.1s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(220,38,38,0.25);
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); box-shadow: 0 4px 20px rgba(220,38,38,0.18); }
    50% { transform: scale(1.08); box-shadow: 0 6px 28px rgba(220,38,38,0.38); }
  }

  .rec-status { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .rec-status.active { color: var(--red3); font-weight: 600; }
  .timer {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-family: 'Gaegu', cursive;
    letter-spacing: 0.04em;
  }
  .timer.recording { color: var(--red3); }

  /* ── LIST ── */
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .count-badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 999px;
    background: var(--yellow);
    color: var(--yellow3);
    font-weight: 700;
    border: 1.5px solid var(--yellow2);
  }

  .rec-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .empty-list { text-align: center; color: var(--text2); font-size: 13px; padding: 18px 0 8px; }

  .rec-item {
    background: var(--sky);
    border: 1.5px solid var(--sky2);
    border-radius: 14px;
    padding: 12px 14px 10px;
    transition: box-shadow 0.15s;
  }
  .rec-item:hover { box-shadow: 0 2px 12px rgba(56,189,248,0.15); }

  .rec-top { display: flex; align-items: flex-start; gap: 10px; }
  .rec-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--blue2);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Gaegu', cursive;
    letter-spacing: -0.03em;
  }
  .rec-info { flex: 1; }
  .rec-name { font-size: 15px; font-weight: 700; color: var(--blue3); }
  .rec-book { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .rec-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .rec-date { font-size: 11px; color: var(--text2); }
  .rec-dur {
    font-size: 12px;
    font-weight: 600;
    color: var(--blue2);
    background: var(--white);
    border-radius: 8px;
    padding: 2px 8px;
    border: 1px solid var(--sky2);
  }

  .rec-actions { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
  .btn-play {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--blue2);
    background: var(--white);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--blue2);
    transition: all 0.15s;
  }
  .btn-play:hover { background: var(--sky2); }
  .btn-play.playing { background: var(--blue2); color: #fff; }

  .btn-dl {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--green2);
    background: var(--green);
    color: var(--green3);
    text-decoration: none;
    font-weight: 600;
    transition: background 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-dl:hover { background: var(--green2); color: #fff; }

  .btn-del {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--red2);
    background: var(--red);
    color: var(--red3);
    cursor: pointer;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }
  .btn-del:hover { background: var(--red2); color: #fff; }

  .audio-wrap { margin-top: 8px; }
  .audio-wrap audio { width: 100%; height: 30px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 400px) {
    .app-header h1 { font-size: 24px; }
    .rec-btn { width: 70px; height: 70px; font-size: 26px; }
    .timer { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1><span class="deco">📖</span> 책읽기 녹음 <span class="deco">🎙️</span></h1>
  <p>3학년 책읽기 녹음 &amp; 듣기</p>
</div>

<div class="main">

  <!-- 학생 등록 -->
  <div class="card">
    <div class="card-title"><span class="ico">👦</span> 학생 등록</div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="학생 이름 입력" maxlength="10" />
      <button class="btn-add" onclick="addStudent()">+ 추가</button>
    </div>
    <div class="chips" id="studentChips">
      <span class="empty-chips">등록된 학생 없음</span>
    </div>
  </div>

  <!-- 책 제목 -->
  <div class="card">
    <div class="card-title"><span class="ico">📚</span> 책 제목</div>
    <input type="text" id="bookInput" placeholder="읽을 책 제목을 입력하세요" />
  </div>

  <!-- 녹음 -->
  <div class="card rec-card">
    <div class="card-title"><span class="ico">🎙️</span> 녹음</div>
    <div class="rec-center">
      <div class="selected-info empty" id="selectedInfo">학생을 먼저 선택하세요</div>
      <div class="rec-btn-wrap">
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()">🎙️</button>
      </div>
      <div class="rec-status" id="recStatus">버튼을 누르면 녹음 시작</div>
      <div class="timer" id="timer">0:00</div>
    </div>
  </div>

  <!-- 녹음 목록 -->
  <div class="card">
    <div class="list-header">
      <div class="card-title" style="margin-bottom:0"><span class="ico">🎧</span> 녹음 목록</div>
      <span class="count-badge" id="countBadge" style="display:none"></span>
    </div>
    <div class="rec-list" id="recList">
      <div class="empty-list">아직 녹음이 없습니다 🎈</div>
    </div>
  </div>

</div><!-- /main -->

<script>
let students = [];
let selectedStudent = null;
let mediaRecorder = null;
let audioChunks = [];
let recordings = [];
let timerInterval = null;
let seconds = 0;

function addStudent() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) return;
  if (students.includes(name)) { input.value = ''; return; }
  students.push(name);
  input.value = '';
  renderChips();
}
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStudent();
});

function selectStudent(name) {
  selectedStudent = (selectedStudent === name) ? null : name;
  renderChips();
  updateSelectedInfo();
}

function removeStudent(name, e) {
  e.stopPropagation();
  students = students.filter(s => s !== name);
  if (selectedStudent === name) selectedStudent = null;
  renderChips();
  updateSelectedInfo();
}

function renderChips() {
  const el = document.getElementById('studentChips');
  if (!students.length) {
    el.innerHTML = '<span class="empty-chips">등록된 학생 없음</span>';
    return;
  }
  el.innerHTML = students.map(n =>
    `<div class="chip ${selectedStudent === n ? 'selected' : ''}" onclick="selectStudent('${n}')">
      ${n}
      <span class="rm" onclick="removeStudent('${n}',event)">✕</span>
    </div>`
  ).join('');
}

function updateSelectedInfo() {
  const el = document.getElementById('selectedInfo');
  if (selectedStudent) {
    el.textContent = `선택된 학생: ${selectedStudent}`;
    el.classList.remove('empty');
  } else {
    el.textContent = '학생을 먼저 선택하세요';
    el.classList.add('empty');
  }
}

async function toggleRecord() {
  if (!selectedStudent) { alert('학생을 먼저 선택해 주세요!'); return; }
  const btn = document.getElementById('recBtn');
  const status = document.getElementById('recStatus');
  const timerEl = document.getElementById('timer');

  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = saveRecording;
      mediaRecorder.start();
      btn.classList.add('recording');
      btn.textContent = '⏹️';
      status.textContent = '녹음 중...';
      status.classList.add('active');
      timerEl.classList.add('recording');
      seconds = 0;
      timerEl.textContent = '0:00';
      timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        timerEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
      }, 1000);
    } catch (err) {
      alert('마이크 권한이 필요합니다.\n브라우저에서 마이크 허용을 눌러 주세요.');
    }
  } else {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    clearInterval(timerInterval);
    btn.classList.remove('recording');
    btn.textContent = '🎙️';
    status.textContent = '저장 중...';
    status.classList.remove('active');
    timerEl.classList.remove('recording');
  }
}

function saveRecording() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const book = document.getElementById('bookInput').value.trim() || '(책 제목 없음)';
  const now = new Date();
  const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  recordings.unshift({ student: selectedStudent, book, url, date: dateStr, dur: seconds, blob });
  document.getElementById('recStatus').textContent = '버튼을 누르면 녹음 시작';
  document.getElementById('timer').textContent = '0:00';
  renderList();
}

function renderList() {
  const el = document.getElementById('recList');
  const badge = document.getElementById('countBadge');
  if (!recordings.length) {
    el.innerHTML = '<div class="empty-list">아직 녹음이 없습니다 🎈</div>';
    badge.style.display = 'none';
    return;
  }
  badge.style.display = 'inline';
  badge.textContent = recordings.length + '개';

  el.innerHTML = recordings.map((r, i) => {
    const m = Math.floor(r.dur / 60);
    const s = r.dur % 60;
    const durStr = `${m}:${String(s).padStart(2,'0')}`;
    const initials = r.student.slice(-2);
    return `
    <div class="rec-item" id="item${i}">
      <div class="rec-top">
        <div class="rec-avatar">${initials}</div>
        <div class="rec-info">
          <div class="rec-name">${r.student}</div>
          <div class="rec-book">📚 ${r.book}</div>
        </div>
        <div class="rec-right">
          <div class="rec-date">${r.date}</div>
          <div class="rec-dur">⏱ ${durStr}</div>
        </div>
      </div>
      <div class="rec-actions">
        <button class="btn-play" id="playBtn${i}" onclick="toggleAudio(${i})">▶</button>
        <a class="btn-dl" href="${r.url}" download="${r.student}_${r.book}.webm">⬇ 저장</a>
        <button class="btn-del" onclick="deleteRec(${i})">🗑 삭제</button>
      </div>
      <div class="audio-wrap" id="audioWrap${i}" style="display:none">
        <audio id="audio${i}" src="${r.url}" onended="audioEnded(${i})"></audio>
      </div>
    </div>`;
  }).join('');
}

function toggleAudio(i) {
  const wrap = document.getElementById(`audioWrap${i}`);
  const audio = document.getElementById(`audio${i}`);
  const btn = document.getElementById(`playBtn${i}`);
  if (!audio) return;
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    audio.play();
    btn.textContent = '⏸';
    btn.classList.add('playing');
  } else if (audio.paused) {
    audio.play();
    btn.textContent = '⏸';
    btn.classList.add('playing');
  } else {
    audio.pause();
    btn.textContent = '▶';
    btn.classList.remove('playing');
  }
}

function audioEnded(i) {
  const btn = document.getElementById(`playBtn${i}`);
  if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
}

function deleteRec(i) {
  if (!confirm('이 녹음을 삭제할까요?')) return;
  URL.revokeObjectURL(recordings[i].url);
  recordings.splice(i, 1);
  renderList();
}
</script>
</body>
</html>
